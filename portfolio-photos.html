<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation | Carla Mathias De Simone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-bg: #0f172a;
            --secondary-bg: #1e293b;
            --accent-gold: #d4af37;
            --accent-copper: #b87333;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 100%);
            color: var(--text-light);
            min-height: 100vh;
        }
        
        .font-serif { font-family: 'Playfair Display', serif; }
        
        .nav-container {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            backdrop-filter: blur(20px);
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }
        
        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s;
            padding: 0.5rem 0;
            position: relative;
        }
        
        .nav-link:hover, .nav-link.active { color: var(--accent-gold); }
        
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-gold);
            transition: width 0.3s;
        }
        
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }
        
        .gallery-container {
            padding: 100px 2rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            border: 2px solid rgba(212, 175, 55, 0.2);
            transition: all 0.4s ease;
            aspect-ratio: 4/3;
            cursor: pointer;
            background: rgba(30, 41, 59, 0.5);
        }
        
        .gallery-item:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        
        .gallery-item:hover img { transform: scale(1.05); }
        
        .gallery-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(15, 23, 42, 0.95), transparent);
            padding: 2.5rem 1rem 1rem;
        }
        
        .gallery-category {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(212, 175, 55, 0.2);
            color: var(--accent-gold);
            font-size: 0.75rem;
            border-radius: 4px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .gallery-title {
            color: var(--text-light);
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(10px);
        }
        
        .lightbox.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .lightbox-content {
            max-width: 90%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 8px;
        }
        
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: var(--accent-gold);
            font-size: 40px;
            cursor: pointer;
        }
        
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .lightbox-nav:hover {
            background: var(--accent-gold);
            color: var(--primary-bg);
        }
        
        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }
        
        .lightbox-caption {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(15, 23, 42, 0.9);
            padding: 1rem 2rem;
            border-radius: 8px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent-gold);
            text-decoration: none;
            margin-bottom: 2rem;
            transition: all 0.3s;
        }
        
        .back-btn:hover { transform: translateX(-5px); }
        
        .gallery-empty {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }
        
        @media (max-width: 768px) {
            .gallery { grid-template-columns: 1fr; }
            .lightbox-nav { width: 40px; height: 40px; font-size: 16px; }
            .lightbox-prev { left: 10px; }
            .lightbox-next { right: 10px; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav-container">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="font-serif text-xl font-bold text-yellow-500">Carla M.D.S.</a>
            <div class="flex gap-6 items-center">
                <a href="index.html" class="nav-link">Accueil</a>
                <a href="portfolio-photos.html" class="nav-link active" style="color: var(--accent-gold)">Photos</a>
                <a href="portfolio-visuels.html" class="nav-link">Visuels</a>
                <a href="portfolio-videos.html" class="nav-link">Vidéos</a>
            </div>
        </div>
    </nav>

    <!-- Contenu -->
    <div class="gallery-container">
        <a href="index.html" class="back-btn">
            <i data-lucide="arrow-left"></i>
            <span>Retour à l'accueil</span>
        </a>
        
        <h1 class="text-4xl font-serif text-center mb-2" style="color: var(--accent-gold)">Documentation</h1>
        <p class="text-center text-gray-400 mb-8">Photos de missions, archives et événements professionnels</p>
        
        <!-- La galerie sera remplie par JavaScript -->
        <div id="gallery" class="gallery"></div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <button class="lightbox-nav lightbox-prev" onclick="navigateLightbox(-1)">&#10094;</button>
        <img class="lightbox-content" id="lightbox-img" src="" alt="">
        <button class="lightbox-nav lightbox-next" onclick="navigateLightbox(1)">&#10095;</button>
        <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>

    <script>
        // ==========================================
        // LISTE MANUELLE DE VOS PHOTOS
        // MODIFIEZ CETTE PARTIE AVEC VOS VRAIES PHOTOS
        // ==========================================

const portfolioPhotos = [
        { src: "Images/cb8d4475-297a-40b4-bec9-f43cf5f9f4d0 2.jpg", title: "équipe OXFAM QC, Bénin, 2025", category: "Documentation" },
    { src: "Images/cb8d4475-297a-40b4-bec9-f43cf5f9f4d0.jpg", title: "équipe OXFAM QC, Bénin, 2025", category: "Documentation" },
    { src: "Images/444021af-a7f5-4dc7-8a4e-dc5073318569.jpg", title: "Fond d'archive d'OXFAM avant traitement", category: "Documentation" },
    { src: "Images/IMG_2555.JPG", title: "Fond d'archive d'OXFAM avant traitement", category: "Documentation" },
    { src: "Images/IMG_3405.JPG", title: "Fond d'archive d'OXFAM avant traitement", category: "Documentation" },
    { src: "Images/IMG_5191.jpeg", title: "Fond d'archive d'OXFAM pendant traitement", category: "Documentation" },
    { src: "Images/IMG_5190.jpeg", title: "Fond d'archive d'OXFAM pendant traitement", category: "Documentation" },
    { src: "Images/IMG_5235.jpeg", title: "Fond d'archive d'OXFAM après traitement", category: "Documentation" },
    { src: "Images/IMG_5228.jpeg", title: "Fond d'archive d'OXFAM après traitement", category: "Documentation" },
    { src: "Images/IMG_3974.JPG", title: "Jounée internationale de volontaires (JIV), Bénin, 2024", category: "Documentation" },
    { src: "Images/IMG_3969.JPG", title: "Jounée internationale de volontaires (JIV), Bénin, 2024", category: "Documentation" },
    { src: "Images/IMG_5149.JPG", title: "Jounée internationale de volontaires (JIV), Bénin, 2024", category: "Documentation" },
    { src: "Images/33216862-6c4b-4826-b117-ed6480399095.jpg", title: "Jounée internationale de volontaires (JIV), Bénin, 2024", category: "Documentation" },
    { src: "Images/IMG_3501.JPG", title: "Bilan des projets avec partenaires, OXFAM QC, Bénin, 2025", category: "Documentation" },
    { src: "Images/IMG_4043.jpeg", title: "Bilan des projets avec partenaires, OXFAM QC, Bénin, 2025", category: "Documentation" },
    { src: "Images/IMG_4062.jpeg", title: "Bilan des projets avec partenaires, OXFAM QC, Bénin, 2025", category: "Documentation" },
    { src: "Images/IMG_4430.jpeg", title: "Bilan des projets avec partenaires, OXFAM QC, Bénin, 2025", category: "Documentation" },
    { src: "Images/f3cadf61-4e6e-4067-a5b4-f35635a4090c.jpg", title: "Projet Ça Suffit, OXFAM QC au bénin, 2025", category: "Documentation" },
    { src: "Images/IMG_6198.jpeg", title: "Kiosque OXFAM QC, festival Afro-monde,Montréal, 2025", category: "Documentation" },
    { src: "Images/IMG_6197.jpeg", title: "Kiosque OXFAM QC, festival Afro-monde,Montréal, 2025", category: "Documentation" },
    { src: "Images/IMG_6191.jpeg", title: "Kiosque OXFAM QC, festival Afro-monde,Montréal, 2025", category: "Documentation" },
    { src: "Images/IMG_5960.jpeg", title: "RAIL, Bénin, 2025", category: "Documentation" },
    { src: "Images/IMG_6074.jpeg", title: "RAIL, Bénin, 2025", category: "Documentation" },
];

// ==========================================
// NE RIEN TOUCHER EN DESSOUS
// ==========================================

let currentIndex = 0;

// Initialisation
document.addEventListener('DOMContentLoaded', () => {
    lucide.createIcons();
    initGallery();
});

function initGallery() {
    const gallery = document.getElementById('gallery');
    
    if (portfolioPhotos.length === 0) {
        gallery.innerHTML = '<div class="gallery-empty">Aucune photo. Ajoutez des photos dans le tableau portfolioPhotos</div>';
        return;
    }
    
    gallery.innerHTML = '';
    
    portfolioPhotos.forEach((photo, index) => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.onclick = () => openLightbox(index);
        
        item.innerHTML = `
            <img src="${photo.src}" alt="${photo.title}" loading="lazy" onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\\'padding:2rem;text-align:center;color:var(--text-muted)\\'>Image non trouvée:<br>${photo.src}</div>'">
            <div class="gallery-caption">
                <span class="gallery-category">${photo.category}</span>
                <div class="gallery-title">${photo.title}</div>
            </div>
        `;
        
        gallery.appendChild(item);
    });
}

// Lightbox
function openLightbox(index) {
    currentIndex = index;
    updateLightbox();
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = 'auto';
}

function navigateLightbox(direction) {
    currentIndex += direction;
    if (currentIndex >= portfolioPhotos.length) currentIndex = 0;
    if (currentIndex < 0) currentIndex = portfolioPhotos.length - 1;
    updateLightbox();
}

function updateLightbox() {
    const photo = portfolioPhotos[currentIndex];
    document.getElementById('lightbox-img').src = photo.src;
    document.getElementById('lightbox-caption').innerHTML = `
        <div style="color: var(--accent-gold); margin-bottom: 0.5rem;">${photo.category}</div>
        <strong style="color: var(--text-light);">${photo.title}</strong>
    `;
}

// Clavier
document.addEventListener('keydown', (e) => {
    const lightbox = document.getElementById('lightbox');
    if (lightbox.classList.contains('active')) {
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') navigateLightbox(-1);
        if (e.key === 'ArrowRight') navigateLightbox(1);
    }
});

// Fermer en cliquant hors image
document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target.id === 'lightbox') closeLightbox();
});
    </script>
</body>
</html>
