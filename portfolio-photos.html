<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Photos | Carla Mathias De Simone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-bg: #0f172a;
            --secondary-bg: #1e293b;
            --accent-gold: #d4af37;
            --accent-copper: #b87333;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 100%);
            color: var(--text-light);
            min-height: 100vh;
        }
        
        .font-serif { font-family: 'Playfair Display', serif; }
        
        /* Navigation */
        .nav-container {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            backdrop-filter: blur(20px);
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }
        
        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s;
            padding: 0.5rem 0;
            position: relative;
        }
        
        .nav-link:hover, .nav-link.active { color: var(--accent-gold); }
        
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-gold);
            transition: width 0.3s;
        }
        
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }
        
        /* GALERIE PHOTOS - GRID RESPONSIVE */
        .gallery-container {
            padding: 100px 2rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            border: 2px solid rgba(212, 175, 55, 0.2);
            transition: all 0.4s ease;
            aspect-ratio: 4/3;
            cursor: pointer;
            background: rgba(30, 41, 59, 0.5);
        }
        
        .gallery-item:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        
        .gallery-item:hover img { transform: scale(1.1); }
        
        .gallery-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(15, 23, 42, 0.95), transparent);
            padding: 2rem 1rem 1rem;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        
        .gallery-item:hover .gallery-caption { transform: translateY(0); }
        
        .gallery-title {
            color: var(--accent-gold);
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .gallery-category {
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        
        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
        }
        
        .lightbox.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
        }
        
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: var(--accent-gold);
            font-size: 40px;
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .lightbox-close:hover { color: var(--text-light); }
        
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .lightbox-nav:hover {
            background: var(--accent-gold);
            color: var(--primary-bg);
        }
        
        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }
        
        .lightbox-caption {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(15, 23, 42, 0.8);
            padding: 1rem 2rem;
            border-radius: 8px;
        }
        
        /* Loading state */
        .gallery-loading {
            text-align: center;
            padding: 3rem;
            color: var(--accent-gold);
        }
        
        .gallery-empty {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        
        /* Back button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent-gold);
            text-decoration: none;
            margin-bottom: 2rem;
            transition: all 0.3s;
        }
        
        .back-btn:hover { transform: translateX(-5px); }
        
        /* Responsive */
        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 1rem;
            }
            
            .lightbox-nav {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
            
            .lightbox-prev { left: 10px; }
            .lightbox-next { right: 10px; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav-container">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="font-serif text-xl font-bold text-yellow-500">Carla M.D.S.</a>
            <div class="flex gap-6 items-center">
                <a href="index.html" class="nav-link" data-key="nav_home">Accueil</a>
                <a href="portfolio-photos.html" class="nav-link active" data-key="nav_photos">Photos</a>
                <a href="portfolio-visuels.html" class="nav-link" data-key="nav_visuels">Visuels</a>
                <a href="portfolio-videos.html" class="nav-link" data-key="nav_videos">Vidéos</a>
            </div>
        </div>
    </nav>

    <!-- Contenu -->
    <div class="gallery-container">
        <a href="index.html" class="back-btn">
            <i data-lucide="arrow-left"></i>
            <span data-key="back_home">Retour à l'accueil</span>
        </a>
        
        <h1 class="text-4xl font-serif text-center mb-2" style="color: var(--accent-gold)" data-key="portfolio_title">Portfolio Photographie</h1>
        <p class="text-center text-gray-400 mb-8" data-key="portfolio_subtitle">Sélection de mes travaux photographiques</p>
        
        <!-- Galerie générée automatiquement -->
        <div id="gallery" class="gallery">
            <div class="gallery-loading">Chargement des photos...</div>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <button class="lightbox-nav lightbox-prev" onclick="navigateLightbox(-1)">&#10094;</button>
        <img class="lightbox-content" id="lightbox-img" src="" alt="">
        <button class="lightbox-nav lightbox-next" onclick="navigateLightbox(1)">&#10095;</button>
        <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>

    <!-- Scripts -->
    <script src="photos-data.js"></script>
    <script>
        // Variables globales
        let currentPhotos = [];
        let currentIndex = 0;
        
        // Initialisation des icônes
        lucide.createIcons();
        
        // Fonction d'initialisation (appelée par photos-data.js)
        function initPhotoGallery(photos) {
            currentPhotos = photos;
            const gallery = document.getElementById('gallery');
            
            if (!photos || photos.length === 0) {
                gallery.innerHTML = '<div class="gallery-empty">Aucune photo trouvée. Ajoutez des images dans le dossier /images.</div>';
                return;
            }
            
            gallery.innerHTML = '';
            
            photos.forEach((photo, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.onclick = () => openLightbox(index);
                
                item.innerHTML = `
                    <img src="${photo.src}" alt="${photo.title}" loading="lazy" onerror="this.parentElement.style.display='none'">
                    <div class="gallery-caption">
                        <div class="gallery-title">${photo.title}</div>
                        <div class="gallery-category">${photo.category}</div>
                    </div>
                `;
                
                gallery.appendChild(item);
            });
        }
        
        // Lightbox functions
        function openLightbox(index) {
            currentIndex = index;
            updateLightbox();
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        function navigateLightbox(direction) {
            currentIndex += direction;
            if (currentIndex >= currentPhotos.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = currentPhotos.length - 1;
            updateLightbox();
        }
        
        function updateLightbox() {
            const photo = currentPhotos[currentIndex];
            document.getElementById('lightbox-img').src = photo.src;
            document.getElementById('lightbox-caption').innerHTML = `
                <strong style="color: var(--accent-gold)">${photo.title}</strong><br>
                <span style="color: var(--text-muted)">${photo.category}</span>
            `;
        }
        
        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            const lightbox = document.getElementById('lightbox');
            if (lightbox.classList.contains('active')) {
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowLeft') navigateLightbox(-1);
                if (e.key === 'ArrowRight') navigateLightbox(1);
            }
        });
        
        // Close on background click
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') closeLightbox();
        });
        
        // Traductions
        const translations = {
            fr: {
                nav_home: "Accueil",
                nav_photos: "Photos",
                nav_visuels: "Visuels",
                nav_videos: "Vidéos",
                portfolio_title: "Portfolio Photographie",
                portfolio_subtitle: "Sélection de mes travaux photographiques",
                back_home: "Retour à l'accueil"
            },
            en: {
                nav_home: "Home",
                nav_photos: "Photos",
                nav_visuels: "Visuals",
                nav_videos: "Videos",
                portfolio_title: "Photography Portfolio",
                portfolio_subtitle: "Selection of my photographic work",
                back_home: "Back to home"
            },
            pt: {
                nav_home: "Início",
                nav_photos: "Fotos",
                nav_visuels: "Visuais",
                nav_videos: "Vídeos",
                portfolio_title: "Portfólio de Fotografia",
                portfolio_subtitle: "Seleção dos meus trabalhos fotográficos",
                back_home: "Voltar ao início"
            }
        };
        
        // Détecter la langue depuis l'URL ou localStorage
        const urlLang = new URLSearchParams(window.location.search).get('lang');
        const storedLang = localStorage.getItem('preferredLang');
        const currentLang = urlLang || storedLang || 'fr';
        
        // Appliquer les traductions
        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            if (translations[currentLang] && translations[currentLang][key]) {
                el.textContent = translations[currentLang][key];
            }
        });
    </script>
</body>
</html>
